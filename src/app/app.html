<!--
  ARQUIVO: app.html
  DESCRIÇÃO: Template HTML do componente raiz (App)

  ESTRUTURA:
  ┌─────────────────────────────────────┐
  │       app-header                    │
  │   (menu de navegação)               │
  ├─────────────────────────────────────┤
  │       <router-outlet>               │
  │   (conteúdo das páginas)            │
  ├─────────────────────────────────────┤
  │       app-footer                    │
  │   (rodapé)                          │
  └─────────────────────────────────────┘

  COMPONENTES:
  1. app-header = navegação (Home, Clientes, About)
  2. <router-outlet> = local onde os componentes das rotas são renderizados
  3. app-footer = informações de rodapé
-->

<div class="box">
  <!-- Componente Header: Menu de navegação no topo -->
  <app-header></app-header>

  <!-- Seção principal: Conteúdo dinâmico das páginas -->
  <main class="container">
    <!--
      router-outlet: Diretiva do Angular Router
      Renderiza o componente correspondente à rota atual
      Se estiver em / → renderiza <app-home>
      Se estiver em /about → renderiza <app-about>
      Se estiver em /cliente → renderiza <app-client-comp>
      Se estiver em /cliente/:id → renderiza <app-cliente-form>
    -->
    <router-outlet></router-outlet>
  </main>

  <!-- Componente Footer: Informações no rodapé -->
  <app-footer></app-footer>
</div>
