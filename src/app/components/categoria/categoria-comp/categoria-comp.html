<h2>Categorias</h2>

<a class="add" [state]="{ btnText: 'Cadastrar' }" routerLink="/categorias/novo">
  Cadastrar Nova Categoria
</a>

<div class="search-box">
  <label for="text">Buscar categoria:</label>
  <input type="text" placeholder="Buscar por nome" (input)="search($event)" class="form-control">
</div>

<div>
  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th class="acoes">Ações</th>
      </tr>
    </thead>
    <tbody>
      @for (categoria of categoriaListaFiltrado(); track categoria.id) {
      <tr>
        <td>{{ categoria.nome }}</td>
        <td>
          <a routerLink="/categorias/{{ categoria.id }}">Alterar</a>
          /
          <a (click)="excluirCategoria(categoria.id)" style="cursor: pointer; color: red;">
            Excluir
          </a>
        </td>
      </tr>
      }
      @empty {
      <tr>
        <td colspan="4" style="text-align: center;">
          Nenhuma categoria encontrado.
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>
