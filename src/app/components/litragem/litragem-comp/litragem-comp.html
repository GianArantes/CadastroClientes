<h2>Litragem</h2>

<a class="add" [state]="{ btnText: 'Cadastrar' }" routerLink="/litragem/novo">
  Cadastrar Nova Litragem
</a>

<div class="search-box">
  <label for="text">Buscar litragem:</label>
  <input type="text" placeholder="Buscar por nome" (input)="search($event)" class="form-control">
</div>

<div>
  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th class="acoes">Ações</th>
      </tr>
    </thead>
    <tbody>
      @for (litragem of litragemListaFiltrado(); track litragem.id) {
      <tr>
        <td>{{ litragem.nome }}</td>
        <td>
          <a routerLink="/litragem/{{ litragem.id }}">Alterar</a>
          /
          <a (click)="excluirLitragem(litragem.id)" style="cursor: pointer; color: red;">
            Excluir
          </a>
        </td>
      </tr>
      }
      @empty {
      <tr>
        <td colspan="4" style="text-align: center;">
          Nenhuma litragem encontrado.
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>
