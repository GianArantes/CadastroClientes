<h2>NCMs</h2>

<a class="add" [state]="{ btnText: 'Cadastrar' }" routerLink="/ncms/novo">
  Cadastrar Novo NCM
</a>

<div class="search-box">
  <label for="text">Buscar NCMs:</label>
  <input type="text" placeholder="Buscar por código ou descrição..." (input)="search($event)" class="form-control">
</div>

<div>
  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Descrição</th>
        <th class="acoes">Ações</th>
      </tr>
    </thead>
    <tbody>
      @for (ncm of ncmListaFiltrado; track ncm.id) {
      <tr>
        <td><a [routerLink]="['/ncms-estados', ncm.id]">{{ ncm.codigo }}</a></td>
        <td>{{ ncm.descricao }}</td>
        <td>
          <a routerLink="/ncms/{{ ncm.id }}">Alterar</a>
          /
          <a (click)="excluirNcm(ncm.id)" style="cursor: pointer; color: red;">
            Excluir
          </a>
        </td>
      </tr>
      }
      @empty {
      <tr>
        <td colspan="4" style="text-align: center;">
          Nenhum NCM encontrado.
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>
