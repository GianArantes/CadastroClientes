<h2>Produtos</h2>

<a class="add" [state]="{ btnText: 'Cadastrar' }" routerLink="/produtos/novo">
  Cadastrar Novo Produto
</a>

<div class="search-box">
  <label for="text">Buscar produto:</label>
  <input type="text" placeholder="Buscar por nome" (input)="search($event)" class="form-control">
</div>


<div>
  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th class="acoes">Ações</th>
      </tr>
    </thead>

    <!-- Corpo da tabela -->
    <tbody>


      @for (produto of produtoListaFiltrado(); track produto.id) {
      <!-- Linha da tabela para cada produto -->
      <tr>

        <td>{{ produto.nome }}</td>
        <td>
          <a routerLink="/produtos/{{ produto.id }}">Alterar</a>

          <!-- Separador entre ações -->
          /


          <a (click)="excluirProduto(produto.id)" style="cursor: pointer; color: red;">
            Excluir
          </a>
        </td>
      </tr>
      }


      @empty {

      <tr>
        <td colspan="4" style="text-align: center;">
          Nenhum produto encontrado.
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>
